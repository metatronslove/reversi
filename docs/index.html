<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JavaScript Reversi</title>
  <!-- Favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='90' font-size='90'>🔷</text></svg>">
    
  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="JavaScript Reversi">
  <meta property="og:description" content="Ancient Game Against Artificial Intellegence">
  <meta property="og:image" content="https://metatronslove.github.io/reversi/og-image.png">
  <meta property="og:url" content="https://metatronslove.github.io/reversi/">
  <meta name="twitter:card" content="summary_large_image">
  <link rel="stylesheet" href="css/styles.css">
  <script data-name="BMC-Widget" 
        data-cfasync="false" 
        src="https://cdnjs.buymeacoffee.com/1.0.0/widget.prod.min.js" 
        data-id="metatronslove" 
        data-description="Support me on Buy me a coffee!" 
        data-message="Projelerimi beğeniyor musun? Bana kahve ısmarla!" 
        data-color="#FFDD00" 
        data-position="right" 
        data-x_margin="18" 
        data-y_margin="18">
  </script>
  <script src="js/jquery-3.7.1.min.js"></script>
</head>
<body>
  <header>
    <h1>JavaScript Reversi</h1>
  </header>
  <main>
    <div class="board" id="board"></div>
    <div class="controls">
      <button id="undo" disabled>Undo</button>
      <div class="player-info">
        <div class="player white">
          <span id="whitepointer" class="pointer" aria-hidden="true">►</span>
          <span id="whiteline" class="player-label" data-player="white" title="Click to play as white">White:</span>
          <span id="whitenum"> 2</span>
          <span id="whitecomputer" class="computer">computer</span>
        </div>
        <div class="player black">
          <span id="blackpointer" class="pointer" aria-hidden="true">►</span>
          <span id="blackline" class="player-label" data-player="black" title="Click to play as black">Black:</span>
          <span id="blacknum"> 2</span>
          <span id="blackcomputer" class="computer" hidden>computer</span>
        </div>
      </div>
      <button id="pass">Pass</button>
    </div>
  </main>
  <footer>
  </footer>
  <script src="js/reversi.js"></script>
</body>
</html>
